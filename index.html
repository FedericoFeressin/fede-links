<!doctype html>
<html lang="en">

<head>

  <title>Fede-Links - Enlaces de fededev y más</title>
  <link rel="stylesheet" href="./assests/output.css" />
</head>

<body class="max-w-xl mx-auto border border-black min-h-dvh bg-linear-to-b from-black via-sky-950 to-gray-800">
  <header class="text-white">
    <img src="./assests/Perfil/Photo-Horizontal.webp" alt="Fede Dibujado"
      class="h-[56vh] object-cover mask-radial-center mask-radial-from-60% mask-radial-to-75%" />

    <header class="flex flex-col mb-8 -mt-4 justify-center items-center">
      <span
        class="text-sky-400 text-xl font-mono px-3 py-1 border border-black rounded-full flex items-center justify-center shadow-sm bg-black/65 cursor-crosshair z-10">
        @FedeDev
        <svg class="ml-1 w-5 h-5 text-sky-400 inline" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
          <path fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707a1 1 0 00-1.414-1.414L9 11.172l-1.293-1.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
            clip-rule="evenodd" />
        </svg>
      </span>
      <h1 class="text-3xl font-extrabold leading-tight mt-1">
        Federico Feressin
      </h1>
    </header>

    <section class="flex gap-2 justify-center">
      <a class="bg-zinc-900 p-2 w-12 h-12 size-12 sm:size-16 flex items-center justify-center rounded-full hover:bg-gray-900 transition-colors"
        href="https://github.com/FedericoFeressin" target="_blank" rel="noopener noreferrer" aria-label="GitHub"
        title="Ir al Perfil de Github de Federico Feressin">
        <svg width="28" height="28">
          <use xlink:href="./assests/sprite.svg#github" />
        </svg>
      </a>
      <a class="p-2 w-12 h-12 size-12 sm:size-16 flex items-center justify-center rounded-full hover:scale-110 transition-transform bg-linear-to-tr from-yellow-300 via-pink-600 to-purple-600"
        href="https://www.instagram.com/el_fedexs/" target="_blank" rel="noopener noreferrer" aria-label="Instagram"
        title="Ir al perfil de Instagram de FedeDev">
        <svg width="28" height="28">
          <use xlink:href="./assests/sprite.svg#instagram" />
        </svg>
      </a>
      <a class="bg-[#0A66C2] p-2 w-12 h-12 size-12 sm:size-16 flex items-center justify-center rounded-full hover:bg-[#004182] transition-colors"
        href="https://www.linkedin.com/in/federico-feressin-45704331b/" target="_blank" rel="noopener noreferrer"
        aria-label="LinkedIn" title="Ir al perfil de LinkedIn de Federico Feressin">
        <svg width="28" height="28">
          <use xlink:href="./assests/sprite.svg#linkedin" />
        </svg>
      </a>
    </section>
    <p class="text-center mt-4 text-sm px-4 text-balance pb-2">

      accesibles y de alto rendimiento. Especializado en frontend con HTML,
      CSS y JavaScript, y backend con C#, PHP y MySQL.
    </p>

    <main class="pt-4">
      <div class="grid grid-cols-3 grid-rows-2 gap-2 w-full">
        <a href=""
          class="relative rounded-3xl overflow-hidden bg-linear-to-br from-cyan-900 via-cyan-700 to-cyan-500 border border-cyan-900 flex flex-col items-start hover:scale-105 hover:contrast-125 transition col-span-2 p-7 min-h-44">
          <span class="absolute bottom-2 left-4 font-bold text-2xl">React.js</span>
          <svg class="absolute -right-4 -bottom-4 -rotate-6 size-28" width="100" height="100">
            <use xlink:href="./assests/sprite.svg#react" />
          </svg>
        </a>
        <a href=""
          class="relative rounded-3xl overflow-hidden bg-linear-to-br from-orange-400 via-orange-400 to-orange-600 border border-orange-900 flex flex-col items-start hover:scale-105 hover:contrast-125 transition col-span-1 p-7 min-h-44">
          <span class="absolute bottom-2 left-4 font-bold text-2xl">HTML</span>
          <svg class="absolute -right-4 -bottom-4 -rotate-6 size-26" width="100" height="100">
            <use xlink:href="./assests/sprite.svg#html" />
          </svg>

        <a href=""
          class="relative rounded-3xl overflow-hidden bg-linear-to-br from-green-300 via-green-600 to-green-800 border border-green-900 flex flex-col items-start hover:scale-105 hover:contrast-125 transition col-span-1 p-7 min-h-44">
          <span class="absolute bottom-2 left-4 font-bold text-2xl">Node.js</span>
          <svg class="absolute -right-4 -bottom-4 -rotate-6 size-28" width="100" height="100">
            <use xlink:href="./assests/sprite.svg#node" />
          </svg>
        </a>
        <a href=""
          class="relative rounded-3xl overflow-hidden bg-linear-to-br from-violet-500 via-violet-600 to-violet-700 border border-violet-900 flex flex-col items-start hover:scale-105 hover:contrast-125 transition col-span-2 p-7 min-h-44">

          <svg class="absolute -right-5 -bottom-2 -rotate-6 size-28" width="100" height="100">
            <use xlink:href="./assests/sprite.svg#css" />

        </a>
        <a href=""
          class="relative rounded-3xl overflow-hidden bg-linear-to-br from-yellow-300 via-yellow-500 to-yellow-600 border border-yellow-300 flex flex-col items-start hover:scale-105 hover:contrast-125 transition col-span-2 p-7 min-h-44">
          <span class="absolute bottom-2 left-4 font-bold text-2xl">JavaScript</span>
          <svg class="absolute -right-4 -bottom-2 -rotate-6 size-26" width="80" height="80">
            <use xlink:href="./assests/sprite.svg#JS" />
          </svg>
        </a>
        <a href=""
          class="relative rounded-3xl overflow-hidden bg-linear-to-br from-slate-600 via-slate-700 to-slate-900 border border-gray-500 flex flex-col items-start hover:scale-105 hover:contrast-125 transition col-span-1 p-7 min-h-44">
          <span class="absolute bottom-2 left-4 font-bold text-2xl">PHP</span>
          <svg class="absolute -right-4 -bottom-4 -rotate-6 size-28" width="100" height="100">
            <use xlink:href="./assests/sprite.svg#PHP" />
          </svg>
        </a>

      </div>
    </main>

  </footer>
